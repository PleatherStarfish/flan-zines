name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Each gate runs even if a previous one fails, so a PR shows every problem at once.
      - name: Lint (prettier + eslint)
        run: pnpm lint

      - name: Typecheck (svelte-check)
        if: ${{ !cancelled() }}
        run: pnpm check

      - name: Unit tests
        if: ${{ !cancelled() }}
        run: pnpm test

      - name: Build
        if: ${{ !cancelled() }}
        run: pnpm build

      - name: Install Playwright browser
        if: ${{ !cancelled() }}
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        if: ${{ !cancelled() }}
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
