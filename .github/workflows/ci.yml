name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    # Throwaway Postgres for the RLS + migration suites. The harness applies the
    # Supabase shim (roles + auth helpers), the real migrations, and the seed, then
    # proves the policies by impersonating seeded users. Disposable, so the suite's
    # schema reset is safe.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Each gate runs even if a previous one fails, so a PR shows every problem at once.
      - name: Lint (prettier + eslint)
        run: pnpm lint

      - name: Typecheck (svelte-check)
        if: ${{ !cancelled() }}
        run: pnpm check

      - name: Unit tests (incl. RLS + migration suites against Postgres)
        if: ${{ !cancelled() }}
        run: pnpm test
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/zine_test

      - name: Build
        if: ${{ !cancelled() }}
        run: pnpm build

      - name: Build Storybook (block catalog compiles)
        if: ${{ !cancelled() }}
        run: pnpm build-storybook

      - name: Install Playwright browser
        if: ${{ !cancelled() }}
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        if: ${{ !cancelled() }}
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
