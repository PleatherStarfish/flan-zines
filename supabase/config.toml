# Supabase local config. If your CLI version expects more fields, run
# `supabase init` to regenerate, then re-apply the [auth.external.google] block.
# Schema, roles, and RLS policies are added in Step 1.
project_id = "zine"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
jwt_expiry = 3600
enable_signup = true

# Google sign-in is the primary path (ARCHITECTURE.md §9). Enable + fill via env
# in Step 1; left disabled here so `supabase start` works without credentials.
[auth.external.google]
enabled = false
client_id = ""
secret = ""
